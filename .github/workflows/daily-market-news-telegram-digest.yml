name: Daily Market News Telegram Digest

on:
  push:
    branches:
      - master
  workflow_dispatch:
  schedule:
    # Runs daily at 08:00 Asia/Singapore time (00:00 UTC).
    - cron: "00 00 * * *"

permissions:
  contents: read

jobs:
  publish-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: dev
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Debug secrets presence
        run: |
          if [ -z "${TELEGRAM_BOT_TOKEN:-}" ]; then echo "TELEGRAM_BOT_TOKEN: MISSING"; else echo "TELEGRAM_BOT_TOKEN: PRESENT"; fi
          if [ -z "${TELEGRAM_CHAT_ID:-}" ]; then echo "TELEGRAM_CHAT_ID: MISSING"; else echo "TELEGRAM_CHAT_ID: PRESENT"; fi

      - name: Publish Telegram digest
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DRY_RUN: true
        run: python scripts/daily_market_digest.py
